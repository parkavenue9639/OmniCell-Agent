name: omnicell-agent

services:
  postgres:
    image: ${OMNICELL_POSTGRES_IMAGE:-postgres:15}
    environment:
      POSTGRES_USER: ${OMNICELL_POSTGRES_USER:-omnicell}
      POSTGRES_PASSWORD: ${OMNICELL_POSTGRES_PASSWORD:-omnicell_dev}
      POSTGRES_DB: ${OMNICELL_POSTGRES_DATABASE:-omnicell}
    ports:
      - "${OMNICELL_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - omnicell-postgres-data:/var/lib/postgresql/data

volumes:
  omnicell-postgres-data:
